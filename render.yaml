services:
  - type: web
    name: stock-review-api
    runtime: python
    plan: free
    branch: master
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: PYTHON_VERSION
        value: 3.12
      - key: ENVIRONMENT
        value: staging
      - key: ROLLBAR_ENVIRONMENT
        value: staging
      - key: DATABASE_URL
        value: sqlite:///data/portfolio.db
